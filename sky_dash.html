<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ SKY DASH ⭐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a1f;
            color: white;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #00ffcc, #ffff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px #00ffcc;
            margin-bottom: 8px;
        }
        
        .score {
            font-size: 1.15rem;
            margin: 8px 12px;
            display: inline-block;
            background: rgba(0,255,204,0.1);
            padding: 10px 24px;
            border-radius: 12px;
            border: 4px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
        }
        
        canvas {
            border: 8px solid #00ffcc;
            border-radius: 20px;
            box-shadow: 0 0 60px #00ffcc, 0 0 120px rgba(0,255,204,0.3);
            image-rendering: pixelated;
            background: #000;
            touch-action: none;
        }
        
        .menu, .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,15,40,0.97);
            padding: 35px 55px;
            border: 8px solid #00ffcc;
            border-radius: 25px;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            box-shadow: 0 0 80px #00ffcc;
        }
        
        button {
            padding: 16px 45px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.15rem;
            background: linear-gradient(#ff0066, #cc0044);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 0 30px #ff0066;
            transition: all 0.15s;
        }
        
        button:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 0 45px #ff3388;
        }
        
        .ad-placeholder {
            margin-top: 18px;
            padding: 12px;
            background: rgba(255,255,255,0.06);
            border: 3px dashed #555;
            width: 728px;
            max-width: 95vw;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>⭐ SKY DASH ⭐</h1>
        <div class="score">SCORE: <span id="score">0</span></div>
        <div class="score">HIGH: <span id="highscore">0</span></div>
    </header>
    
    <canvas id="game" width="420" height="620"></canvas>
    
    <div id="menu" class="menu">
        <h2 style="color:#ffff00; font-size:1.6rem;">READY TO FLY?</h2>
        <button onclick="startGame()">PLAY GAME</button>
        <p style="font-size:0.85rem; opacity:0.9;">TAP / SPACE / UP to flap wings</p>
    </div>
    
    <div id="gameOver" class="game-over">
        <h2 style="color:#ff3366; font-size:2rem;">CRASHED!</h2>
        <p style="font-size:1.1rem;">FINAL SCORE: <span id="finalScore" style="color:#ffff00;">0</span></p>
        <button onclick="restartGame()">TRY AGAIN</button>
        <button onclick="shareScore()">SHARE SCORE</button>
    </div>
    
    <div class="ad-placeholder">
        [ PLACE GOOGLE ADSENSE HERE ]
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const menuScreen = document.getElementById('menu');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        
        let bird = { x: 90, y: 280, velocity: 0, radius: 19, gravity: 0.58, flap: -14.2, wingFrame: 0 };
        let pipes = [], stars = [], particles = [], scorePopups = [];
        let score = 0, highScore = localStorage.getItem('skyDashHigh') || 0, frame = 0;
        let gameRunning = false, paused = false, shake = 0;
        
        highscoreEl.textContent = highScore;
        let bgOffset = 0, cloudOffset = 0;
        
        // Audio
        function playSound(freq, duration, type = 'sine', vol = 0.4) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.value = vol;
                osc.connect(gain).connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }
        
        function createParticles(x, y, color, count, size=6, spread=7) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random()-0.5)*spread,
                    vy: (Math.random()-0.5)*spread - 1.5,
                    life: 28 + Math.random()*18,
                    color,
                    size
                });
            }
        }
        
        function createScorePopup(x, y, points) {
            scorePopups.push({ x, y: y-20, points, life: 45, vy: -1.8 });
        }
        
        function drawBackground() {
            // Deep sky
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1a0b3d');
            grad.addColorStop(1, '#0a0a2e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Distant mountains
            ctx.fillStyle = '#1f1b4d';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height-120);
            ctx.lineTo(120, 180);
            ctx.lineTo(280, canvas.height-150);
            ctx.lineTo(420, canvas.height-80);
            ctx.lineTo(0, canvas.height);
            ctx.fill();
            
            // Clouds / stars parallax
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 40; i++) {
                const x = ((i * 42 + cloudOffset * 0.3) % (canvas.width + 100)) - 40;
                const y = 70 + (i % 9) * 48;
                ctx.globalAlpha = 0.35 + Math.sin(frame/25 + i) * 0.25;
                ctx.fillRect(x, y, 4, 4);
            }
            ctx.globalAlpha = 1;
        }
        
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + Math.sin(frame/4)*1.5, bird.y);
            const rot = Math.min(Math.max(bird.velocity * 0.065, -0.7), 1.4);
            ctx.rotate(rot);
            
            // Body glow
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ffeb3b';
            
            // Main body
            ctx.fillStyle = '#ffeb3b';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.radius, bird.radius*0.85, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Wing flap animation
            bird.wingFrame = (bird.wingFrame + 0.3) % 6;
            const wingAngle = bird.velocity > 3 ? 0.6 : Math.sin(bird.wingFrame) * 0.7 - 0.2;
            ctx.fillStyle = '#ff9800';
            ctx.save();
            ctx.rotate(wingAngle);
            ctx.beginPath();
            ctx.ellipse(-4, 4, 16, 9, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            
            // Eye
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#fff';
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(10, -7, 8.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#222';
            ctx.beginPath(); ctx.arc(12 + Math.sin(frame/8)*1.5, -7, 4.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(13, -9, 2, 0, Math.PI*2); ctx.fill();
            
            // Beak
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ff5722';
            ctx.beginPath();
            ctx.moveTo(22, 0);
            ctx.lineTo(32, -7);
            ctx.lineTo(32, 7);
            ctx.fill();
            
            ctx.restore();
        }
        
        function generatePipe() {
            const gap = 172;
            const height = 90 + Math.random() * (canvas.height - gap - 210);
            pipes.push({ x: canvas.width + 30, top: height, passed: false });
        }
        
        function generateStar() {
            if (Math.random() < 0.5) {
                stars.push({ 
                    x: canvas.width + 40, 
                    y: 140 + Math.random() * (canvas.height - 320), 
                    collected: false,
                    pulse: 0
                });
            }
        }
        
        function update() {
            if (!gameRunning || paused) return;
            frame++;
            
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            
            if (bird.y + bird.radius > canvas.height - 55 || bird.y - bird.radius < 30) endGame();
            
            // Pipes update
            for (let i = pipes.length-1; i >= 0; i--) {
                const p = pipes[i];
                p.x -= 2.9;
                
                if (!p.passed && p.x + 55 < bird.x) {
                    p.passed = true;
                    score += 10;
                    scoreEl.textContent = score;
                    playSound(820, 0.09, 'square', 0.5);
                    createScorePopup(bird.x + 20, bird.y - 25, 10);
                }
                
                if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + 68) {
                    if (bird.y - bird.radius < p.top || bird.y + bird.radius > p.top + gap) {
                        endGame();
                    }
                }
                if (p.x < -100) pipes.splice(i,1);
            }
            
            // Stars
            for (let i = stars.length-1; i >= 0; i--) {
                const s = stars[i];
                s.x -= 2.9;
                s.pulse = (s.pulse + 0.2) % (Math.PI*2);
                
                const dx = bird.x - s.x;
                const dy = bird.y - s.y;
                if (dx*dx + dy*dy < 1100 && !s.collected) {
                    s.collected = true;
                    score += 25;
                    scoreEl.textContent = score;
                    playSound(1350, 0.12);
                    playSound(2100, 0.25, 'sine', 0.35);
                    createParticles(s.x, s.y, '#ffff00', 26, 7, 9);
                    createScorePopup(s.x, s.y - 10, 25);
                }
                if (s.x < -50) stars.splice(i,1);
            }
            
            // Particles
            for (let i = particles.length-1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.32;
                p.life--;
                if (p.life <= 0) particles.splice(i,1);
            }
            
            for (let i = scorePopups.length-1; i >= 0; i--) {
                const p = scorePopups[i];
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) scorePopups.splice(i,1);
            }
            
            if (frame % 65 === 0) generatePipe();
            if (frame % 38 === 0) generateStar();
            
            bgOffset += 0.8;
            cloudOffset += 0.35;
            
            if (shake > 0) shake--;
        }
        
        function drawPipes() {
            for (let p of pipes) {
                // Top pipe
                const gradTop = ctx.createLinearGradient(p.x, 0, p.x+68, 0);
                gradTop.addColorStop(0, '#22c55e');
                gradTop.addColorStop(1, '#15803d');
                ctx.fillStyle = gradTop;
                ctx.fillRect(p.x, 0, 68, p.top);
                
                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillRect(p.x + 8, 0, 12, p.top);
                
                // Cap
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(p.x-8, p.top-42, 84, 42);
                
                // Bottom pipe
                const bottomY = p.top + 172;
                ctx.fillStyle = gradTop;
                ctx.fillRect(p.x, bottomY, 68, canvas.height - bottomY);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillRect(p.x + 8, bottomY, 12, canvas.height - bottomY);
                ctx.fillRect(p.x-8, bottomY, 84, 42);
            }
        }
        
        function drawStars() {
            for (let s of stars) {
                if (s.collected) continue;
                const pulseSize = Math.sin(s.pulse) * 3 + 11;
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#fef08c';
                ctx.fillStyle = '#fef08c';
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(frame / 7);
                ctx.fillRect(-pulseSize/2, -4, pulseSize, 8);
                ctx.fillRect(-4, -pulseSize/2, 8, pulseSize);
                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }
        
        function drawParticles() {
            for (let p of particles) {
                ctx.globalAlpha = Math.max(p.life / 35, 0.1);
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }
        
        function drawScorePopups() {
            ctx.font = 'bold 22px Press Start 2P';
            ctx.textAlign = 'center';
            for (let p of scorePopups) {
                ctx.globalAlpha = p.life / 45;
                ctx.fillStyle = p.points > 10 ? '#ffff00' : '#aaffaa';
                ctx.fillText('+' + p.points, p.x, p.y);
            }
            ctx.globalAlpha = 1;
        }
        
        function drawGround() {
            ctx.fillStyle = '#2c2118';
            ctx.fillRect(0, canvas.height-55, canvas.width, 55);
            ctx.fillStyle = '#1f180f';
            for (let i = 0; i < canvas.width + 40; i += 38) {
                ctx.fillRect(i + (bgOffset % 38), canvas.height-55, 22, 55);
            }
        }
        
        function draw() {
            const sx = shake ? (Math.random()-0.5)*shake*2 : 0;
            const sy = shake ? (Math.random()-0.5)*shake*2 : 0;
            
            ctx.save();
            ctx.translate(sx, sy);
            
            drawBackground();
            drawPipes();
            drawStars();
            drawBird();
            drawParticles();
            drawScorePopups();
            drawGround();
            
            ctx.restore();
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function flap() {
            if (!gameRunning || paused) return;
            bird.velocity = bird.flap;
            playSound(520, 0.08, 'triangle', 0.7);
        }
        
        function startGame() {
            menuScreen.style.display = 'none';
            gameRunning = true;
            resetGame();
        }
        
        function resetGame() {
            bird.y = 280; bird.velocity = -4;
            pipes = []; stars = []; particles = []; scorePopups = [];
            score = 0; frame = 0;
            scoreEl.textContent = '0';
            generatePipe(); generatePipe();
        }
        
        function endGame() {
            gameRunning = false;
            shake = 18;
            playSound(180, 0.8, 'sawtooth', 0.6);
            createParticles(bird.x, bird.y, '#ff3366', 45, 9, 11);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('skyDashHigh', highScore);
                highscoreEl.textContent = highScore;
            }
            finalScoreEl.textContent = score;
            setTimeout(() => gameOverScreen.style.display = 'flex', 400);
        }
        
        function restartGame() {
            gameOverScreen.style.display = 'none';
            resetGame();
            gameRunning = true;
        }
        
        function shareScore() {
            const text = `🏆 I scored ${score} points in Sky Dash! Think you can beat me?`;
            navigator.clipboard.writeText(text + '\n' + window.location.href);
            alert('Score copied to clipboard! Share on social media 🎉');
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); flap(); }
            if (e.key.toLowerCase() === 'p') paused = !paused;
        });
        
        canvas.addEventListener('click', flap);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });
        
        menuScreen.style.display = 'flex';
        gameLoop();
    </script>
</body>
</html>
